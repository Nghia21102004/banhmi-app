<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bánh Mì Băng Tâm</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1>🥖 Bánh mì</h1>

<div class="menu">

<button onclick="showPage('home')">Trang chủ</button>

<button onclick="showPage('sell')">Nhập bán hàng</button>

<button onclick="showPage('cost')">Chi phí</button>

<button onclick="showPage('profit')">Lợi nhuận</button>

<button onclick="showPage('history')">Lịch sử</button>

</div>


<!-- DASHBOARD -->

<div id="home" class="page">

<h2>Dashboard</h2>

<p>
Doanh thu hôm nay:
<span id="todayRevenue">0</span>
VNĐ
</p>

<p>
Chi phí hôm nay:
<span id="todayCost">0</span>
VNĐ
</p>

<p>
Lợi nhuận:
<span id="todayProfit">0</span>
VNĐ
</p>

</div>


<!-- BÁN HÀNG -->

<div id="sell" class="page">

<h2>Nhập bán hàng</h2>

<label>Loại bánh</label>

<select id="banh">

<option value="15000">Bánh mì thịt</option>

<option value="12000">Bánh mì trứng</option>

<option value="10000">Bánh mì chả</option>

</select>

<label>Số lượng</label>

<input type="number" id="soluong">

<button onclick="addSell()">Thêm</button>

<p id="sellList"></p>

</div>


<!-- CHI PHÍ -->

<div id="cost" class="page">

<h2>Nhập chi phí</h2>

<input type="text" id="costName" placeholder="Tên chi phí">

<input type="number" id="costMoney" placeholder="Số tiền">

<button onclick="addCost()">Thêm chi phí</button>

<p id="costList"></p>

</div>


<!-- LỢI NHUẬN -->

<div id="profit" class="page">

<h2>Lợi nhuận</h2>

<p>
Tổng lợi nhuận:
<span id="profitMoney">0</span>
VNĐ
</p>

</div>


<!-- LỊCH SỬ -->

<div id="history" class="page">

<h2>Lịch sử bán</h2>

<p>Danh sách sẽ hiển thị ở đây</p>

</div>


<script src="js/script.js"></script>

</body>
</html>
